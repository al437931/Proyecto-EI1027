<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/base}">
<head><title>Comunicacions</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><span class="current">Comunicacions</span></nav>
  <h1><i class="bi bi-chat-dots me-2"></i>Comunicacions</h1>
  <a th:href="@{/comunicaciousuariovipap/add}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Afegir comunicacio</a>
  <div th:if="${#lists.isEmpty(comunicacions)}" class="alert alert-info">No hi ha comunicacions registrades.</div>
  <div th:unless="${#lists.isEmpty(comunicacions)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Comunicacions registrades</caption>
      <thead class="table-success"><tr><th scope="col">ID</th><th scope="col">Seleccio</th><th scope="col">Data i hora</th><th scope="col">Emissor</th><th scope="col">Missatge</th><th scope="col" class="no-sort">Accions</th></tr></thead>
      <tbody><tr th:each="c : ${comunicacions}">
        <td th:text="${c.idComunicacio}"></td><td th:text="${'#' + c.idSeleccion}"></td>
        <td th:text="${c.dataHora}"></td>
        <td><span th:class="${c.emissor == 'tecnic' ? 'badge-estat badge-aprovada' : c.emissor == 'usuari' ? 'badge-estat badge-en-revisio' : 'badge-estat badge-proposat'}" th:text="${c.emissor}"></span></td>
        <td th:text="${c.missatge}"></td>
        <td><a th:href="@{'/comunicaciousuariovipap/delete/' + ${c.idComunicacio}}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td>
      </tr></tbody>
    </table>
  </div>
</section>
</body>
</html>
