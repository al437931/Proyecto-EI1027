<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Llista de seleccions</title>
</head>
<body>
<h1>Llista de seleccions</h1>
<a th:href="@{/seleccion/add}">Afegir selecció</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>ID Sol·licitud</th>
        <th>ID Assistent</th>
        <th>Data proposta</th>
        <th>Estat</th>
        <th>Accions</th>
    </tr>
    <tr th:each="s : ${seleccions}">
        <td th:text="${s.idSeleccion}"></td>
        <td th:text="${s.idRequest}"></td>
        <td th:text="${s.idAssistent}"></td>
        <td th:text="${s.dataProposta}"></td>
        <td th:text="${s.estat}"></td>
        <td>
            <a th:href="@{'/seleccion/update/' + ${s.idSeleccion}}">Editar</a> |
            <a th:href="@{'/seleccion/delete/' + ${s.idSeleccion}}">Eliminar</a>
        </td>
    </tr>
</table>
</body>
</html>
