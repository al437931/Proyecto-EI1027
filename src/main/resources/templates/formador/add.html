<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/base}">
<head><title>Afegir formador</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><a th:href="@{/formador/list}">Formadors</a><span class="separator">&#8250;</span><span class="current">Afegir</span></nav>
  <h1><i class="bi bi-plus-circle me-2"></i>Afegir Formador</h1>
  <form th:action="@{/formador/add}" th:object="${formador}" method="post" class="row g-3">
    <div class="col-md-4"><label for="nom" class="form-label">Nom *</label><input id="nom" type="text" th:field="*{nom}" class="form-control" required/></div>
    <div class="col-md-4"><label for="cognoms" class="form-label">Cognoms *</label><input id="cognoms" type="text" th:field="*{cognoms}" class="form-control" required/></div>
    <div class="col-md-4"><label for="email" class="form-label">Email *</label><input id="email" type="email" th:field="*{email}" class="form-control" required/></div>
    <div class="col-md-6"><label for="especialitat" class="form-label">Especialitat</label><input id="especialitat" type="text" th:field="*{especialitat}" class="form-control"/></div>
    <div class="col-12"><button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Afegir</button> <a th:href="@{/formador/list}" class="btn btn-outline-secondary ms-2"><i class="bi bi-x-lg me-1"></i>Cancel·lar</a></div>
  </form>
</section>
</body>
</html>
