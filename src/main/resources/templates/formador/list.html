<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/base}">
<head><title>Formadors</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><span class="current">Formadors</span></nav>
  <h1><i class="bi bi-mortarboard me-2"></i>Formadors</h1>
  <a th:href="@{/formador/add}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Afegir formador</a>
  <div th:if="${#lists.isEmpty(formadors)}" class="alert alert-info">No hi ha formadors registrats.</div>
  <div th:unless="${#lists.isEmpty(formadors)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Formadors registrats</caption>
      <thead class="table-success"><tr><th scope="col">ID</th><th scope="col">Nom</th><th scope="col">Cognoms</th><th scope="col">Especialitat</th><th scope="col">Email</th><th scope="col" class="no-sort">Accions</th></tr></thead>
      <tbody><tr th:each="f : ${formadors}">
        <td th:text="${f.idFormador}"></td><td th:text="${f.nom}"></td><td th:text="${f.cognoms}"></td><td th:text="${f.especialitat}"></td><td th:text="${f.email}"></td>
        <td><a th:href="@{'/formador/update/' + ${f.idFormador}}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a><a th:href="@{'/formador/delete/' + ${f.idFormador}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Esteu segur?')"><i class="bi bi-trash"></i></a></td>
      </tr></tbody>
    </table>
  </div>
</section>
</body>
</html>
