<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>El meu perfil</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta">
    <a th:href="@{/}">Inici</a><span class="separator">›</span>
    <span class="current">El meu perfil</span>
  </nav>

  <h1><i class="bi bi-person-circle me-2"></i>El meu perfil</h1>

  <div class="card card-sgovi">
    <div class="card-header bg-primary text-white">
      <i class="bi bi-person-circle me-1"></i>Les meues dades
    </div>
    <div class="card-body">
      <form th:action="@{/assistent/perfil}" th:object="${assistent}" method="post" class="row g-3">
        <!-- Camps de només lectura -->
        <div class="col-md-3">
          <label for="idAssistentDisabled" class="form-label">ID</label>
          <input type="hidden" th:field="*{idAssistent}"/>
          <input type="text" id="idAssistentDisabled" class="form-control" th:value="${assistent.idAssistent}" readonly disabled/>
        </div>
        <div class="col-md-3">
          <label for="emailDisabled" class="form-label">Email (No modificable)</label>
          <input type="hidden" th:field="*{email}"/>
          <input type="email" id="emailDisabled" class="form-control" th:value="${assistent.email}" readonly disabled/>
        </div>
        <div class="col-md-3">
          <label for="tipusDisabled" class="form-label">Tipus</label>
          <input type="hidden" th:field="*{tipusAssistent}"/>
          <input type="text" id="tipusDisabled" class="form-control" th:value="${assistent.tipusAssistent}" readonly disabled/>
        </div>
        <div class="col-md-3">
          <label class="form-label">Estat</label>
          <input type="hidden" th:field="*{estatAcceptat}"/>
          <span th:class="${assistent.estatAcceptat != null and assistent.estatAcceptat ? 'badge-estat badge-aprovada' : 'badge-estat badge-en-revisio'}"
                th:text="${assistent.estatAcceptat != null and assistent.estatAcceptat ? 'Acceptat' : 'Pendent'}"></span>
        </div>

        <!-- Camps editables -->
        <div class="col-md-6 mt-3">
          <label for="nom" class="form-label">Nom <span class="text-danger">*</span></label>
          <input id="nom" type="text" th:field="*{nom}" class="form-control" required maxlength="50"
                 pattern="[A-Za-zÀ-ÿ\s'-]+" th:errorclass="is-invalid"/>
          <div th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-6 mt-3">
          <label for="cognoms" class="form-label">Cognoms <span class="text-danger">*</span></label>
          <input id="cognoms" type="text" th:field="*{cognoms}" class="form-control" required maxlength="80"
                 th:errorclass="is-invalid"/>
          <div th:if="${#fields.hasErrors('cognoms')}" th:errors="*{cognoms}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-4">
          <label for="telefon" class="form-label">Telèfon</label>
          <input id="telefon" type="tel" th:field="*{telefon}" class="form-control" maxlength="9"
                 pattern="[0-9]{9}" th:errorclass="is-invalid"/>
          <div th:if="${#fields.hasErrors('telefon')}" th:errors="*{telefon}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-4">
          <label for="formacio" class="form-label">Formació</label>
          <input id="formacio" type="text" th:field="*{formacio}" class="form-control" maxlength="200"/>
        </div>
        <div class="col-md-4">
          <label for="experiencia" class="form-label">Experiència</label>
          <input id="experiencia" type="text" th:field="*{experiencia}" class="form-control" maxlength="200"/>
        </div>
        <div class="col-md-6">
          <label for="disponibilitat" class="form-label">Disponibilitat</label>
          <input id="disponibilitat" type="text" th:field="*{disponibilitat}" class="form-control" maxlength="200"/>
        </div>

        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>Actualitzar dades
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
</body>
</html>
