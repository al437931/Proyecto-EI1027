<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Detall sol·licitud</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <a th:href="@{/tecnic/solicituds}">Sol·licituds</a>
    <span class="separator">›</span>
    <span class="current" th:text="|Sol·licitud REQ-2026-${#numbers.formatInteger(solicitud.idRequest, 4)}|"></span>
  </nav>

  <h1><i class="bi bi-clipboard-data me-2"></i>Detall de la sol·licitud</h1>

  <div class="card card-sgovi mb-3">
    <div class="card-body">
      <div class="row">
        <div class="col-md-4 info-group">
          <div class="info-label">Número</div>
          <div class="info-value" th:text="|REQ-2026-${#numbers.formatInteger(solicitud.idRequest, 4)}|"></div>
        </div>
        <div class="col-md-4 info-group">
          <div class="info-label">Sol·licitant</div>
          <div class="info-value" th:text="${nomSolicitant}"></div>
        </div>
        <div class="col-md-4 info-group">
          <div class="info-label">Data de creació</div>
          <div class="info-value" th:text="${#temporals.format(solicitud.dataCreacio, 'dd/MM/yyyy')}"></div>
        </div>
        <div class="col-md-4 info-group">
          <div class="info-label">Tipus d'assistència</div>
          <div class="info-value" th:text="${solicitud.tipusAssistencia}"></div>
        </div>
        <div class="col-md-4 info-group">
          <div class="info-label">Estat</div>
          <div class="info-value">
            <span th:class="${'badge-estat ' +
                (solicitud.estat == 'en revisio' ? 'badge-en-revisio' :
                 solicitud.estat == 'aprovada' ? 'badge-aprovada' :
                 solicitud.estat == 'rebutjada' ? 'badge-rebutjada' : 'badge-tancada')}"
                  th:text="${solicitud.estat}"></span>
          </div>
        </div>
        <div class="col-12 info-group mt-2">
          <div class="info-label">Descripció de les necessitats</div>
          <div class="info-value" th:text="${solicitud.descripcioNecessitats}"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accions del tècnic -->
  <div th:if="${solicitud.estat == 'en revisio'}" class="d-flex gap-2 mb-3">
    <form th:action="@{'/tecnic/solicitud/' + ${solicitud.idRequest} + '/aprovar'}" method="post">
      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-circle me-1"></i>Aprovar sol·licitud
      </button>
    </form>
    <form th:action="@{'/tecnic/solicitud/' + ${solicitud.idRequest} + '/rebutjar'}" method="post"
          onsubmit="return confirm('Esteu segur de voler rebutjar aquesta sol·licitud?')">
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-x-circle me-1"></i>Rebutjar sol·licitud
      </button>
    </form>
  </div>

  <div th:if="${solicitud.estat == 'aprovada'}" class="d-flex gap-2 mb-3">
    <a th:href="@{'/tecnic/solicitud/' + ${solicitud.idRequest} + '/candidats'}"
       class="btn btn-primary">
      <i class="bi bi-people me-1"></i>Proposar candidats
    </a>
    <form th:action="@{'/tecnic/solicitud/' + ${solicitud.idRequest} + '/revertir'}" method="post"
          onsubmit="return confirm('Esteu segur de voler desfer l\'aprovació?')">
      <button type="submit" class="btn btn-outline-danger">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Desfer aprovació
      </button>
    </form>
  </div>

  <a th:href="@{/tecnic/solicituds}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Tornar al panell
  </a>
</section>
</body>
</html>
