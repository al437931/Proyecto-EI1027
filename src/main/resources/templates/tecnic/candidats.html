<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Proposar candidats</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <a th:href="@{/tecnic/solicituds}">Sol·licituds</a>
    <span class="separator">›</span>
    <a th:href="@{'/tecnic/solicitud/' + ${solicitud.idRequest}}"
       th:text="'Sol·licitud #' + ${solicitud.idRequest}"></a>
    <span class="separator">›</span>
    <span class="current">Proposar candidats</span>
  </nav>

  <h1><i class="bi bi-people me-2"></i>Proposar candidats</h1>

  <div class="alert alert-info">
    <i class="bi bi-info-circle me-1"></i>
    Seleccioneu l'assistent personal més adient per a la sol·licitud
    <strong th:text="'#' + ${solicitud.idRequest}"></strong>
    (Tipus: <span th:text="${solicitud.tipusAssistencia}"></span>).
  </div>

  <div th:if="${#lists.isEmpty(candidats)}" class="alert alert-warning">
    No hi ha assistents acceptats disponibles.
  </div>

  <div th:unless="${#lists.isEmpty(candidats)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Assistents personals disponibles</caption>
      <thead class="table-success">
        <tr>
          <th scope="col">Nom</th>
          <th scope="col">Cognoms</th>
          <th scope="col">Email</th>
          <th scope="col">Formació</th>
          <th scope="col">Disponibilitat</th>
          <th scope="col" class="no-sort">Acció</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${candidats}">
          <td th:text="${c.nom}"></td>
          <td th:text="${c.cognoms}"></td>
          <td th:text="${c.email}"></td>
          <td th:text="${c.formacio}"></td>
          <td th:text="${c.disponibilitat}"></td>
          <td>
            <form th:action="@{'/tecnic/solicitud/' + ${solicitud.idRequest} + '/seleccionar/' + ${c.idAssistent}}"
                  method="post" style="display:inline;"
                  onsubmit="return confirm('Confirmeu la selecció d\'aquest candidat?')">
              <button type="submit" class="btn btn-sm btn-success">
                <i class="bi bi-check-lg me-1"></i>Seleccionar
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <a th:href="@{'/tecnic/solicitud/' + ${solicitud.idRequest}}" class="btn btn-outline-secondary mt-2">
    <i class="bi bi-arrow-left me-1"></i>Tornar al detall
  </a>
</section>
</body>
</html>
