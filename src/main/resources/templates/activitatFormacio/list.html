<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/base}">
<head><title>Activitats de Formacio</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><span class="current">Activitats de Formacio</span></nav>
  <h1><i class="bi bi-calendar-event me-2"></i>Activitats de Formacio</h1>
  <a th:href="@{/activitatformacio/add}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Afegir activitat</a>
  <div th:if="${#lists.isEmpty(activitats)}" class="alert alert-info">No hi ha activitats registrades.</div>
  <div th:unless="${#lists.isEmpty(activitats)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Activitats de formacio registrades</caption>
      <thead class="table-success"><tr><th scope="col">ID</th><th scope="col">Titol</th><th scope="col">Data</th><th scope="col">Tipus</th><th scope="col">Aforament</th><th scope="col" class="no-sort">Accions</th></tr></thead>
      <tbody><tr th:each="a : ${activitats}">
        <td th:text="${a.idActivitat}"></td><td th:text="${a.titol}"></td>
        <td th:text="${a.data != null ? #temporals.format(a.data, 'dd/MM/yyyy') : '-'}"></td>
        <td><span th:class="${a.tipus == 'formacio' ? 'badge-estat badge-aprovada' : 'badge-estat badge-en-revisio'}" th:text="${a.tipus}"></span></td>
        <td th:text="${a.aforament}"></td>
        <td><a th:href="@{'/activitatformacio/update/' + ${a.idActivitat}}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a><a th:href="@{'/activitatformacio/delete/' + ${a.idActivitat}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Esteu segur?')"><i class="bi bi-trash"></i></a></td>
      </tr></tbody>
    </table>
  </div>
</section>
</body>
</html>
