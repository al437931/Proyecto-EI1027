<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Activitats de Formació</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><span class="current">Activitats de Formació</span></nav>
  <h1><i class="bi bi-calendar-event me-2"></i>Activitats de Formació</h1>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a th:href="@{/activitatformacio/add}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Afegir activitat</a>
    <form th:action="@{/activitatformacio/list}" method="get" class="d-flex">
      <input type="text" name="cerca" class="form-control me-2" th:value="${cerca}" placeholder="Cercar per títol o descripció..." aria-label="Cerca d'activitats">
      <button type="submit" class="btn btn-primary" aria-label="Cercar"><i class="bi bi-search"></i></button>
      <a th:href="@{/activitatformacio/list}" th:if="${cerca != null and !cerca.isEmpty()}" class="btn btn-outline-secondary ms-1" aria-label="Netejar cerca"><i class="bi bi-x"></i></a>
    </form>
  </div>
  <div th:if="${#lists.isEmpty(activitats)}" class="alert alert-info">No hi ha activitats registrades.</div>
  <div th:unless="${#lists.isEmpty(activitats)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Activitats de formació registrades</caption>
      <thead class="table-success"><tr>
        <th scope="col">ID</th><th scope="col">Títol</th><th scope="col">Data</th>
        <th scope="col">Tipus</th><th scope="col">Aforament</th>
        <th scope="col">Inscrits</th><th scope="col" class="no-sort">Accions</th>
      </tr></thead>
      <tbody><tr th:each="a : ${activitats}">
        <td th:text="${a.idActivitat}"></td><td th:text="${a.titol}"></td>
        <td th:text="${a.data != null ? #temporals.format(a.data, 'dd/MM/yyyy') : '-'}"></td>
        <td><span th:class="${a.tipus == 'formacio' ? 'badge-estat badge-aprovada' : 'badge-estat badge-en-revisio'}" th:text="${a.tipus}"></span></td>
        <td th:text="${a.aforament}"></td>
        <td>
          <span class="badge bg-info text-dark" th:text="${inscritsMap[a.idActivitat] + ' / ' + a.aforament}"></span>
        </td>
        <td>
          <a th:href="@{'/activitatformacio/update/' + ${a.idActivitat}}" class="btn btn-sm btn-outline-primary me-1" aria-label="Editar activitat"><i class="bi bi-pencil"></i></a>
          <a th:href="@{'/activitatformacio/delete/' + ${a.idActivitat}}" class="btn btn-sm btn-outline-danger" aria-label="Esborrar activitat"><i class="bi bi-trash"></i></a>
        </td>
      </tr></tbody>
    </table>
  </div>
</section>
</body>
</html>
