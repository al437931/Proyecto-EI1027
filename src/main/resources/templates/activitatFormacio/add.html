<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/base}">
<head><title>Afegir activitat</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><a th:href="@{/activitatformacio/list}">Activitats</a><span class="separator">&#8250;</span><span class="current">Afegir</span></nav>
  <h1><i class="bi bi-plus-circle me-2"></i>Afegir Activitat de Formacio</h1>
  <form th:action="@{/activitatformacio/add}" th:object="${activitatFormacio}" method="post" class="row g-3">
    <div class="col-md-8"><label for="titol" class="form-label">Titol *</label><input id="titol" type="text" th:field="*{titol}" class="form-control" required/></div>
    <div class="col-md-4"><label for="data" class="form-label">Data *</label><input id="data" type="date" th:field="*{data}" class="form-control" required/></div>
    <div class="col-12"><label for="descripcio" class="form-label">Descripcio</label><textarea id="descripcio" th:field="*{descripcio}" class="form-control" rows="3"></textarea></div>
    <div class="col-md-4"><label for="tipus" class="form-label">Tipus *</label><select id="tipus" th:field="*{tipus}" class="form-select" required><option value="formacio">Formacio</option><option value="divulgacio">Divulgacio</option></select></div>
    <div class="col-md-4"><label for="aforament" class="form-label">Aforament</label><input id="aforament" type="number" th:field="*{aforament}" class="form-control" min="1"/></div>
    <div class="col-md-4">
        <label for="idFormador" class="form-label">Formador *</label>
        <select id="idFormador" th:field="*{idFormador}" class="form-select" required>
            <option value="">-- Seleccioneu un formador --</option>
            <option th:each="f : ${formadors}" th:value="${f.idFormador}" th:text="${f.nom + ' ' + f.cognoms + ' (' + (f.especialitat != null ? f.especialitat : 'General') + ')'}"></option>
        </select>
    </div>
    <div class="col-12"><button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Afegir</button> <a th:href="@{/activitatformacio/list}" class="btn btn-outline-secondary ms-2"><i class="bi bi-x-lg me-1"></i>Cancel·lar</a></div>
  </form>
</section>
</body>
</html>
