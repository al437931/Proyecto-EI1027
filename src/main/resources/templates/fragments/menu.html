<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#1a5c35;" th:fragment="menu">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">SgOVI</a>
        <div class="navbar-collapse collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inici</a>
                </li>
                <!-- Menú usuari OVI -->
                <li class="nav-item"
                    th:if="${session.usuariLogat != null and session.usuariLogat.rol == 'usuari'}">
                    <a class="nav-link" th:href="@{/usuari/solicituds}">Les meues sol·licituds</a>
                </li>
                <li class="nav-item"
                    th:if="${session.usuariLogat != null and session.usuariLogat.rol == 'usuari'}">
                    <a class="nav-link" th:href="@{/usuari/nova-solicitud}">Nova sol·licitud</a>
                </li>
                <!-- Menú tècnic -->
                <li class="nav-item"
                    th:if="${session.usuariLogat != null and session.usuariLogat.rol == 'tecnic'}">
                    <a class="nav-link" th:href="@{/tecnic/solicituds}">Gestió sol·licituds</a>
                </li>
                <li class="nav-item dropdown"
                    th:if="${session.usuariLogat != null and session.usuariLogat.rol == 'tecnic'}">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown">Gestió</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/usuariovi/list}">Usuaris OVI</a></li>
                        <li><a class="dropdown-item" th:href="@{/assistentpersonal/list}">Assistents</a></li>
                        <li><a class="dropdown-item" th:href="@{/formador/list}">Formadors</a></li>
                    </ul>
                </li>
            </ul>
            <!-- Usuari autenticat a la dreta del navbar -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" th:if="${session.usuariLogat == null}">
                    <a th:href="@{/login}" class="nav-link">Entrar</a>
                </li>
                <li class="nav-item" th:if="${session.usuariLogat != null}">
                    <span class="navbar-text me-2" style="color:#ffffff;">
                        <strong th:text="${session.usuariLogat.nom}"></strong>
                    </span>
                </li>
                <li class="nav-item" th:if="${session.usuariLogat != null}">
                    <a th:href="@{/logout}" class="nav-link">Eixir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
