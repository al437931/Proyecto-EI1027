<!DOCTYPE html>
<html lang="ca"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="SgOVI - Sistema de Gestió de l'Oficina per la Vida Independent de Castelló"/>
    <!-- Bootstrap 5 CSS (només estils, SENSE JS) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- CSS propi -->
    <link type="text/css" th:href="@{/css/sgovi.css}" href="/css/sgovi.css" rel="stylesheet"/>
    <title layout:title-pattern="$CONTENT_TITLE - SgOVI">SgOVI</title>
</head>
<body>
<header>
    <div th:replace="~{fragments/menu :: menu}"></div>
</header>

<main class="container mt-3">
    <!-- Missatges flash de feedback (sense botó dismiss que requereix JS) -->
    <div th:if="${missatgeExitFlash}" class="alert alert-success alert-flash" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${missatgeExitFlash}"></span>
    </div>
    <div th:if="${missatgeErrorFlash}" class="alert alert-danger alert-flash" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${missatgeErrorFlash}"></span>
    </div>

    <section layout:fragment="content">
        <!-- El contingut específic de cada pàgina es col·locarà aquí -->
    </section>
</main>

<footer class="container mt-5">
    <hr>
    <p class="text-center" style="color:#495057; font-size:0.85rem;">
        SgOVI - Oficina per la Vida Independent "Sole Arnau Ripollés" de Castelló
        &nbsp;|&nbsp; EI1027 - Disseny i Implementació de Sistemes d'Informació
    </p>
</footer>
</body>
</html>
