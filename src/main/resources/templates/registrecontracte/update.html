<!DOCTYPE html>
<html lang="ca"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Editar contracte</title></head>
<body>
<section layout:fragment="content">
    <nav class="breadcrumb-sgovi" aria-label="Ruta">
        <a th:href="@{/}">Inici</a><span class="separator">&#8250;</span>
        <a th:href="@{/registrecontracte/list}">Contractes</a><span class="separator">&#8250;</span>
        <span class="current">Editar contracte</span>
    </nav>

    <h1><i class="bi bi-pencil me-2"></i>Editar contracte</h1>

    <form method="post" enctype="multipart/form-data"
          th:action="@{/registrecontracte/update}" class="row g-3" th:object="${registreContracte}">

        <input type="hidden" name="idContracte" th:value="${registreContracte.idContracte}"/>
        <input type="hidden" name="pdfContracte" th:value="${registreContracte.pdfContracte}"/>

        <div class="col-md-6">
            <label for="idAssistent" class="form-label">Assistent Personal *</label>
            <select id="idAssistent" th:field="*{idAssistent}" class="form-select" required th:errorclass="is-invalid">
                <option value="">-- Seleccioneu un assistent --</option>
                <option th:each="a : ${assistents}" th:value="${a.idAssistent}" 
                        th:text="${a.nom + ' ' + a.cognoms + ' (' + a.email + ')'}"></option>
            </select>
            <div th:if="${#fields.hasErrors('idAssistent')}" th:errors="*{idAssistent}" class="invalid-feedback"></div>
            <div class="form-text">Al canviar l'assistent, es recarregaran les sol·licituds.</div>
        </div>

        <div class="col-md-6">
            <label for="idRequest" class="form-label">Sol·licitud associada *</label>
            <select id="idRequest" th:field="*{idRequest}" class="form-select" required th:errorclass="is-invalid">
                <option value="">-- Seleccioneu una sol·licitud --</option>
                <option th:each="s : ${solicituds}" th:value="${s.idRequest}" 
                        th:text="|REQ-2026-${#numbers.formatInteger(s.idRequest, 4)} - ${s.tipusAssistencia} (${s.estat})|"></option>
            </select>
            <div th:if="${#fields.hasErrors('idRequest')}" th:errors="*{idRequest}" class="invalid-feedback"></div>
        </div>

        <div class="col-md-4">
            <label for="dataInici" class="form-label">Data inici *</label>
            <input id="dataInici" type="date" th:field="*{dataInici}" class="form-control" required th:errorclass="is-invalid"/>
            <div th:if="${#fields.hasErrors('dataInici')}" th:errors="*{dataInici}" class="invalid-feedback"></div>
        </div>

        <div class="col-md-4">
            <label for="dataFi" class="form-label">Data fi</label>
            <input id="dataFi" type="date" th:field="*{dataFi}" class="form-control" th:errorclass="is-invalid"/>
            <div th:if="${#fields.hasErrors('dataFi')}" th:errors="*{dataFi}" class="invalid-feedback"></div>
        </div>

        <div class="col-md-4">
            <label for="fitxerPdf" class="form-label">Actualitzar PDF</label>
            <input id="fitxerPdf" type="file" name="fitxerPdf" class="form-control" accept=".pdf"/>
            <div class="form-text" th:if="${registreContracte.pdfContracte != null and !registreContracte.pdfContracte.isEmpty()}">
                Fitxer actual: <span th:text="${registreContracte.pdfContracte}"></span>
            </div>
        </div>

        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Guardar canvis</button>
            <a th:href="@{/registrecontracte/list}" class="btn btn-outline-secondary ms-2"><i class="bi bi-x-lg me-1"></i>Cancel·lar</a>
        </div>
    </form>
</section>
</body>
</html>
