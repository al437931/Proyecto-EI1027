<!DOCTYPE html>
<html lang="ca"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Llista de contractes</title></head>
<body>
<section layout:fragment="content">
    <!-- Breadcrumb -->
    <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
        <a th:href="@{/}">Inici</a>
        <span class="separator">›</span>
        <a th:href="@{/tecnic/solicituds}">Panell tècnic</a>
        <span class="separator">›</span>
        <span class="current">Contractes</span>
    </nav>

    <h1><i class="bi bi-file-earmark-pdf me-2"></i>Registre de contractes</h1>

    <a th:href="@{/registrecontracte/add}" class="btn btn-success mb-3">
        <i class="bi bi-plus-circle me-1"></i>Afegir contracte
    </a>

    <div th:if="${#lists.isEmpty(registres)}" class="alert alert-info">
        No hi ha contractes registrats.
    </div>

    <div th:unless="${#lists.isEmpty(registres)}" class="table-responsive">
        <table class="table table-striped table-hover sortable">
            <caption>Llista de contractes registrats</caption>
            <thead class="table-success">
                <tr>
                    <th scope="col">Núm.</th>
                    <th scope="col">Assistent</th>
                    <th scope="col">Sol·licitud</th>
                    <th scope="col">Data inici</th>
                    <th scope="col">Data fi</th>
                    <th scope="col">Document PDF</th>
                    <th scope="col" class="no-sort">Accions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${registres}">
                    <td th:text="${r.idContracte}"></td>
                    <td th:text="${nomsAssistents[r.idAssistent] != null ? nomsAssistents[r.idAssistent] : 'Assistent #' + r.idAssistent}"></td>
                    <td th:text="${'Sol·licitud #' + r.idRequest}"></td>
                    <td th:text="${r.dataInici != null ? #temporals.format(r.dataInici, 'dd/MM/yyyy') : '-'}"></td>
                    <td th:text="${r.dataFi != null ? #temporals.format(r.dataFi, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <a th:if="${r.pdfContracte != null and !r.pdfContracte.isEmpty()}"
                           th:href="@{'/registrecontracte/pdf/' + ${r.pdfContracte}}"
                           class="btn btn-sm btn-outline-danger" target="_blank">
                            <i class="bi bi-file-earmark-pdf me-1"></i>Descarregar
                        </a>
                        <span th:unless="${r.pdfContracte != null and !r.pdfContracte.isEmpty()}"
                              class="text-muted">Sense PDF</span>
                    </td>
                    <td>
                        <a th:href="@{'/registrecontracte/update/' + ${r.idContracte}}"
                           class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{'/registrecontracte/delete/' + ${r.idContracte}}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Esteu segur de voler eliminar aquest contracte?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
