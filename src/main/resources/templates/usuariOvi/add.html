<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Afegir Usuari OVI</title>
</head>
<body>

<h1>Afegir Usuari OVI</h1>

<form th:action="@{/usuariovi/add}" th:object="${usuariOVI}" method="post">

    <label for="idUsuari">ID Usuari:</label>
    <input id="idUsuari" type="number" th:field="*{idUsuari}" required><br><br>

    <label for="nom">Nom:</label>
    <input id="nom" type="text" th:field="*{nom}" required><br><br>

    <label for="cognoms">Cognoms:</label>
    <input id="cognoms" type="text" th:field="*{cognoms}" required><br><br>

    <label for="email">Email:</label>
    <input id="email" type="email" th:field="*{email}" required><br><br>

    <label for="telefon">Telèfon:</label>
    <input id="telefon" type="text" th:field="*{telefon}" required><br><br>

    <label for="adreca">Adreça:</label>
    <input id="adreca" type="text" th:field="*{adreca}"><br><br>

    <label for="consentimentRGPD">Consentiment RGPD:</label>
    <input id="consentimentRGPD" type="checkbox" th:field="*{consentimentRGPD}"><br><br>

    <label for="dataRegistre">Data registre:</label>
    <input id="dataRegistre" type="date" th:field="*{dataRegistre}" required><br><br>

    <label for="estatCompte">Estat compte:</label>
    <input id="estatCompte" type="text" th:field="*{estatCompte}" required><br><br>

    <button type="submit">Afegir</button>
</form>

<br>
<a th:href="@{/usuariovi/list}">Tornar a la llista</a>

</body>
</html>
