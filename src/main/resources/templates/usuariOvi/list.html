<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Usuaris OVI</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <span class="current">Usuaris OVI</span>
  </nav>

  <h1><i class="bi bi-people me-2"></i>Usuaris OVI</h1>

  <a th:href="@{/usuariovi/add}" class="btn btn-success mb-3">
    <i class="bi bi-person-plus me-1"></i>Afegir usuari
  </a>

  <!-- Avís de comptes pendents -->
  <div th:if="${#lists.size(usuaris.?[estatCompte == 'pendent']) > 0}" class="alert alert-warning mb-3">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>
    <strong th:text="${#lists.size(usuaris.?[estatCompte == 'pendent'])}"></strong> compte/s pendent/s d'activació.
    Premeu el botó <i class="bi bi-check-circle"></i> per activar-los.
  </div>

  <div th:if="${#lists.isEmpty(usuaris)}" class="alert alert-info">
    No hi ha usuaris registrats.
  </div>

  <div th:unless="${#lists.isEmpty(usuaris)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Llista d'usuaris de l'OVI</caption>
      <thead class="table-success">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Nom</th>
          <th scope="col">Cognoms</th>
          <th scope="col">Email</th>
          <th scope="col">Telèfon</th>
          <th scope="col">Data registre</th>
          <th scope="col">Estat</th>
          <th scope="col" class="no-sort">Accions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${usuaris}">
          <td th:text="${u.idUsuari}"></td>
          <td th:text="${u.nom}"></td>
          <td th:text="${u.cognoms}"></td>
          <td th:text="${u.email}"></td>
          <td th:text="${u.telefon}"></td>
          <td th:text="${u.dataRegistre != null ? #temporals.format(u.dataRegistre, 'dd/MM/yyyy') : '-'}"></td>
          <td>
            <span th:class="${'badge-estat ' +
                (u.estatCompte == 'acceptat' ? 'badge-aprovada' :
                 u.estatCompte == 'rebutjat' ? 'badge-rebutjada' : 'badge-en-revisio')}"
                  th:text="${u.estatCompte}"></span>
          </td>
          <td class="d-flex gap-1">
            <form th:if="${u.estatCompte == 'pendent'}" th:action="@{'/usuariovi/activar/' + ${u.idUsuari}}" method="post" style="display:inline">
              <button type="submit" class="btn btn-sm btn-success" title="Activar compte">
                <i class="bi bi-check-circle"></i>
              </button>
            </form>
            <a th:href="@{'/usuariovi/update/' + ${u.idUsuari}}"
               class="btn btn-sm btn-outline-primary">
              <i class="bi bi-pencil"></i>
            </a>
            <a th:href="@{'/usuariovi/delete/' + ${u.idUsuari}}"
               class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Esteu segur de voler eliminar aquest usuari?')">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
