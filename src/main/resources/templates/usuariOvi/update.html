<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificar Usuari OVI</title>
</head>
<body>

<h1>Modificar Usuari OVI</h1>

<form th:action="@{/usuariovi/update}" th:object="${usuariOVI}" method="post">

    <!-- Campo oculto para mantener el ID -->
    <input type="hidden" th:field="*{idUsuari}">

    <label>Nom:</label>
    <input type="text" th:field="*{nom}" required><br><br>

    <label>Cognoms:</label>
    <input type="text" th:field="*{cognoms}" required><br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required><br><br>

    <label>Telèfon:</label>
    <input type="text" th:field="*{telefon}" required><br><br>

    <label>Adreça:</label>
    <input type="text" th:field="*{adreca}"><br><br>

    <label>Consentiment RGPD:</label>
    <input type="checkbox" th:field="*{consentimentRGPD}"><br><br>

    <label>Data registre:</label>
    <input type="date" th:field="*{dataRegistre}" required><br><br>

    <label>Estat compte:</label>
    <input type="text" th:field="*{estatCompte}" required><br><br>

    <button type="submit">Actualitzar</button>
</form>

<br>
<a th:href="@{/usuariovi/list}">Tornar a la llista</a>

</body>
</html>
