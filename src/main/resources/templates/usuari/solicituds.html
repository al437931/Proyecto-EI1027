<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Les meues sol·licituds</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <span class="current">Les meues sol·licituds</span>
  </nav>

  <h1><i class="bi bi-file-earmark-text me-2"></i>Les meues sol·licituds</h1>

  <a th:href="@{/usuari/nova-solicitud}" class="btn btn-success mb-3">
    <i class="bi bi-plus-circle me-1"></i>Nova sol·licitud
  </a>

  <!-- Formulari de cerca sense JS -->
  <div class="card mb-4 bg-light">
    <div class="card-body py-2">
      <form th:action="@{/usuari/solicituds}" method="get" class="row g-2 align-items-center">
        <div class="col-auto flex-grow-1">
          <input type="text" name="cerca" class="form-control" th:value="${cerca}" 
                 placeholder="Cercar per tipus d'assistència o nom de l'assistent (ex. PAP, PATI)..."
                 aria-label="Cerca sol·licituds">
        </div>
        <div class="col-auto">
          <select name="estatFiltre" class="form-select" aria-label="Filtre d'estat">
            <option value="">-- Tots els estats --</option>
            <option value="en revisio" th:selected="${estatFiltre == 'en revisio'}">En revisió</option>
            <option value="aprovada" th:selected="${estatFiltre == 'aprovada'}">Aprovada</option>
            <option value="rebutjada" th:selected="${estatFiltre == 'rebutjada'}">Rebutjada</option>
            <option value="tancada" th:selected="${estatFiltre == 'tancada'}">Tancada</option>
          </select>
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary"><i class="bi bi-search me-1"></i>Filtrar</button>
          <a th:href="@{/usuari/solicituds}" th:if="${(cerca != null and !cerca.isEmpty()) or (estatFiltre != null and !estatFiltre.isEmpty())}" class="btn btn-outline-secondary">Netejar</a>
        </div>
      </form>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(solicituds)}" class="alert alert-info">
    <i class="bi bi-info-circle me-1"></i>Encara no heu creat cap sol·licitud.
  </div>

  <div th:unless="${#lists.isEmpty(solicituds)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Les meues sol·licituds d'assistència personal</caption>
      <thead class="table-success">
        <tr>
          <th scope="col">Núm.</th>
          <th scope="col">Data creació</th>
          <th scope="col">Tipus</th>
          <th scope="col">Assistent</th>
          <th scope="col">Estat</th>
          <th scope="col" class="no-sort">Accions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${solicituds}">
          <td th:text="|REQ-2026-${#numbers.formatInteger(s.idRequest, 4)}|"></td>
          <td th:text="${#temporals.format(s.dataCreacio, 'dd/MM/yyyy')}"></td>
          <td th:text="${s.tipusAssistencia}"></td>
          <td th:text="${s.nomAssistentAssignat}"></td>
          <td>
            <span th:class="${'badge-estat ' +
                (s.estat == 'en revisio' ? 'badge-en-revisio' :
                 s.estat == 'aprovada' ? 'badge-aprovada' :
                 s.estat == 'rebutjada' ? 'badge-rebutjada' : 'badge-tancada')}"
                  th:text="${s.estat}"></span>
          </td>
          <td>
            <a th:href="@{'/usuari/solicitud/' + ${s.idRequest}}"
               class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye me-1"></i>Veure detall
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
