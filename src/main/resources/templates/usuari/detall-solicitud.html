<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Detall sol·licitud</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <a th:href="@{/usuari/solicituds}">Sol·licituds</a>
    <span class="separator">›</span>
    <span class="current" th:text="|Sol·licitud REQ-2026-${#numbers.formatInteger(solicitud.idRequest, 4)}|"></span>
  </nav>

  <h1><i class="bi bi-file-earmark-text me-2"></i>Detall de la sol·licitud</h1>

  <div class="card card-sgovi">
    <div class="card-body">
      <div class="row">
        <div class="col-md-6 info-group">
          <div class="info-label">Número de sol·licitud</div>
          <div class="info-value" th:text="|REQ-2026-${#numbers.formatInteger(solicitud.idRequest, 4)}|"></div>
        </div>
        <div class="col-md-6 info-group">
          <div class="info-label">Data de creació</div>
          <div class="info-value" th:text="${#temporals.format(solicitud.dataCreacio, 'dd/MM/yyyy')}"></div>
        </div>
        <div class="col-md-6 info-group">
          <div class="info-label">Tipus d'assistència</div>
          <div class="info-value" th:text="${solicitud.tipusAssistencia}"></div>
        </div>
        <div class="col-md-6 info-group">
          <div class="info-label">Estat</div>
          <div class="info-value">
            <span th:class="${'badge-estat ' +
                (solicitud.estat == 'en revisio' ? 'badge-en-revisio' :
                 solicitud.estat == 'aprovada' ? 'badge-aprovada' :
                 solicitud.estat == 'rebutjada' ? 'badge-rebutjada' : 'badge-tancada')}"
                  th:text="${solicitud.estat}"></span>
          </div>
        </div>
        <div class="col-12 info-group">
          <div class="info-label">Descripció de les necessitats</div>
          <div class="info-value" th:text="${solicitud.descripcioNecessitats}"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bloque de propuesta de candidato -->
  <div th:if="${solicitud.estat == 'tancada' and seleccion != null}" class="card card-sgovi mt-4 border-success">
    <div class="card-header bg-success text-white">
      <i class="bi bi-person-check-fill me-1"></i>Candidat Proposat
    </div>
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-md-8">
          <h5><span th:text="${assistentProposat.nom + ' ' + assistentProposat.cognoms}"></span></h5>
          <p class="mb-1"><i class="bi bi-telephone me-2"></i><span th:text="${assistentProposat.telefon}"></span></p>
          <p class="mb-1"><i class="bi bi-envelope me-2"></i><span th:text="${assistentProposat.email}"></span></p>
          <p class="mb-0 mt-2"><strong>Estat de la proposta: </strong> 
            <span th:class="${'badge-estat ' + 
                (seleccion.estat == 'acceptat' ? 'badge-aprovada' : 
                 seleccion.estat == 'rebutjat' ? 'badge-rebutjada' : 'badge-en-revisio')}" 
                  th:text="${seleccion.estat}"></span>
          </p>
        </div>
        
        <!-- Botones de acción si está pendiente -->
        <div class="col-md-4 text-end" th:if="${seleccion.estat == 'pendent'}">
          <p class="text-muted small mb-2">Heu d'acceptar o rebutjar aquest candidat per poder formalitzar el contracte.</p>
          <div class="d-grid gap-2">
            <form th:action="@{'/usuari/solicitud/' + ${solicitud.idRequest} + '/seleccion/' + ${seleccion.idSeleccion} + '/acceptar'}" method="post">
              <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-circle me-1"></i>Acceptar candidat</button>
            </form>
            <form th:action="@{'/usuari/solicitud/' + ${solicitud.idRequest} + '/seleccion/' + ${seleccion.idSeleccion} + '/rebutjar'}" method="post" onsubmit="return confirm('Esteu segur de voler rebutjar aquest candidat? La sol·licitud tornarà al tècnic.')">
              <button type="submit" class="btn btn-outline-danger w-100"><i class="bi bi-x-circle me-1"></i>Rebutjar candidat</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a th:href="@{/usuari/solicituds}" class="btn btn-outline-secondary mt-3">
    <i class="bi bi-arrow-left me-1"></i>Tornar a les meues sol·licituds
  </a>
</section>
</body>
</html>
