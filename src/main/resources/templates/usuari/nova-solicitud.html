<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Nova sol·licitud</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegació">
    <a th:href="@{/}">Inici</a>
    <span class="separator">›</span>
    <a th:href="@{/usuari/solicituds}">Sol·licituds</a>
    <span class="separator">›</span>
    <span class="current">Nova sol·licitud</span>
  </nav>

  <h1><i class="bi bi-plus-circle me-2"></i>Nova sol·licitud d'assistència</h1>

  <div class="card card-sgovi">
    <div class="card-body">
      <form th:action="@{/usuari/nova-solicitud}" th:object="${apRequest}" method="post" class="row g-3">

        <div class="col-md-6">
          <label for="tipusAssistencia" class="form-label">Tipus d'assistència <span class="text-danger">*</span></label>
          <select id="tipusAssistencia" th:field="*{tipusAssistencia}" class="form-select"
                  required th:errorclass="needcorrection">
            <option value="">-- Seleccioneu el tipus --</option>
            <option value="PAP">Professional d'Assistència Personal (PAP)</option>
            <option value="PATI">Professional d'Assistència Terapèutica Infantil (PATI)</option>
          </select>
          <div th:if="${#fields.hasErrors('tipusAssistencia')}" th:errors="*{tipusAssistencia}" class="error"></div>
        </div>

        <div class="col-12">
          <label for="descripcioNecessitats" class="form-label">Descripció de les necessitats <span class="text-danger">*</span></label>
          <textarea id="descripcioNecessitats" th:field="*{descripcioNecessitats}" class="form-control"
                    rows="5" required placeholder="Descriviu les vostres necessitats d'assistència personal..."
                    th:errorclass="needcorrection"></textarea>
          <div th:if="${#fields.hasErrors('descripcioNecessitats')}" th:errors="*{descripcioNecessitats}" class="error"></div>
        </div>

        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-send me-1"></i>Enviar sol·licitud
          </button>
          <a th:href="@{/usuari/solicituds}" class="btn btn-outline-secondary ms-2">
            <i class="bi bi-x-lg me-1"></i>Cancel·lar
          </a>
        </div>
      </form>
    </div>
  </div>
</section>
</body>
</html>
