<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Assistents Personals</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta de navegacio">
    <a th:href="@{/}">Inici</a><span class="separator">&#8250;</span>
    <span class="current">Assistents Personals</span>
  </nav>
  <h1><i class="bi bi-person-badge me-2"></i>Assistents Personals</h1>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a th:href="@{/assistentpersonal/add}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Afegir assistent</a>
    <form th:action="@{/assistentpersonal/list}" method="get" class="d-flex">
      <input type="text" name="cerca" class="form-control me-2" th:value="${cerca}" placeholder="Cercar per nom, email..." aria-label="Cerca d'assistents">
      <button type="submit" class="btn btn-primary" aria-label="Cercar"><i class="bi bi-search"></i></button>
      <a th:href="@{/assistentpersonal/list}" th:if="${cerca != null and !cerca.isEmpty()}" class="btn btn-outline-secondary ms-1" aria-label="Netejar cerca"><i class="bi bi-x"></i></a>
    </form>
  </div>
  <div th:if="${#lists.isEmpty(assistents)}" class="alert alert-info">No hi ha assistents registrats.</div>
  <div th:unless="${#lists.isEmpty(assistents)}" class="table-responsive">
    <table class="table table-striped table-hover sortable">
      <caption>Assistents personals registrats</caption>
      <thead class="table-success"><tr>
        <th scope="col">ID</th><th scope="col">Nom</th><th scope="col">Cognoms</th>
        <th scope="col">Email</th><th scope="col">Tipus</th><th scope="col">Formació</th>
        <th scope="col">Disponibilitat</th><th scope="col">Acceptat</th>
        <th scope="col" class="no-sort">Accions</th>
      </tr></thead>
      <tbody>
        <tr th:each="a : ${assistents}">
          <td th:text="${a.idAssistent}"></td><td th:text="${a.nom}"></td><td th:text="${a.cognoms}"></td>
          <td th:text="${a.email}"></td>
          <td><span th:class="${a.tipusAssistent == 'PAP' ? 'badge bg-primary' : a.tipusAssistent == 'PATI' ? 'badge bg-info text-dark' : 'badge bg-secondary'}" th:text="${a.tipusAssistent != null ? a.tipusAssistent : '-'}"></span></td>
          <td th:text="${a.formacio}"></td>
          <td th:text="${a.disponibilitat}"></td>
          <td>
            <span th:class="${a.estatAcceptat != null and a.estatAcceptat ? 'badge-estat badge-aprovada' : 
                             (a.motiuRebuig != null ? 'badge-estat badge-rebutjada' : 'badge-estat badge-en-revisio')}" 
                  th:text="${a.estatAcceptat != null and a.estatAcceptat ? 'Sí' : (a.motiuRebuig != null ? 'Rebutjat' : 'Pendent')}"></span>
            <div th:if="${a.motiuRebuig != null}" class="small text-danger mt-1">
              <strong>Motiu:</strong> <span th:text="${a.motiuRebuig}"></span>
            </div>
          </td>
          <td>
            <a th:href="@{'/assistentpersonal/update/' + ${a.idAssistent}}" class="btn btn-sm btn-outline-primary me-1" title="Editar" aria-label="Editar assistent"><i class="bi bi-pencil"></i></a>
            <a th:href="@{'/assistentpersonal/password/' + ${a.idAssistent}}" class="btn btn-sm btn-outline-secondary me-1" title="Canviar Contrasenya" aria-label="Canviar contrasenya"><i class="bi bi-key"></i></a>
            <a th:href="@{'/assistentpersonal/delete/' + ${a.idAssistent}}" class="btn btn-sm btn-outline-danger" title="Eliminar" aria-label="Eliminar assistent"><i class="bi bi-trash"></i></a>
            
            <!-- Botó per rebutjar (només si no està acceptat i no té motiu ja) -->
            <a th:if="${(a.estatAcceptat == null or !a.estatAcceptat) and a.motiuRebuig == null}"
               th:href="@{'/assistentpersonal/rebutjar/' + ${a.idAssistent}}" class="btn btn-sm btn-outline-warning ms-1" title="Rebutjar compte" aria-label="Rebutjar compte">
              <i class="bi bi-x-circle"></i>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
