<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head><title>Canviar Contrasenya</title></head>
<body>
<section layout:fragment="content">
  <nav class="breadcrumb-sgovi" aria-label="Ruta"><a th:href="@{/}">Inici</a><span class="separator">&#8250;</span><a th:href="@{/assistentpersonal/list}">Assistents</a><span class="separator">&#8250;</span><span class="current">Contrasenya</span></nav>
  <h1><i class="bi bi-key me-2"></i>Canviar Contrasenya d'Assistent</h1>
  <div class="card card-sgovi mt-3">
    <div class="card-body">
      <h5 class="card-title">Assistent: <span th:text="${assistentPersonal.nom + ' ' + assistentPersonal.cognoms}"></span></h5>
      <p class="card-text">Email: <span th:text="${assistentPersonal.email}"></span></p>
      
      <form th:action="@{/assistentpersonal/password}" method="post" class="mt-4">
        <input type="hidden" name="idAssistent" th:value="${assistentPersonal.idAssistent}"/>
        
        <div class="mb-3">
          <label for="password" class="form-label">Nova Contrasenya <span class="text-danger">*</span></label>
          <input type="text" id="password" name="password" class="form-control" required minlength="4" maxlength="50"/>
          <div class="form-text">Introdueix la nova contrasenya per a aquest assistent.</div>
        </div>
        
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar Contrasenya</button>
        <a th:href="@{/assistentpersonal/list}" class="btn btn-outline-secondary ms-2"><i class="bi bi-x-lg me-1"></i>Cancel·lar</a>
      </form>
    </div>
  </div>
</section>
</body>
</html>
