<!DOCTYPE html>
<html lang="ca"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Registre d'Assistent Personal</title>
</head>
<body>
<section layout:fragment="content">
    <h1><i class="bi bi-person-badge me-2"></i>Treballa amb nosaltres (Assistent PAP/PATI)</h1>
    <div class="alert alert-info">
        <i class="bi bi-info-circle me-1"></i>
        En registrar-se, presentarà la seua candidatura per treballar com a Assistent Personal o Tecnològic a l'OVI. Un tècnic avaluarà el seu perfil abans d'acceptar-lo.
    </div>

    <form th:action="@{/register-assistent}" th:object="${assistentPersonal}" method="post" class="row g-3">
        <div class="col-md-5">
            <label for="nom" class="form-label">Nom <span class="text-danger">*</span></label>
            <input id="nom" type="text" th:field="*{nom}" class="form-control" th:errorclass="is-invalid"
                   required maxlength="50" pattern="[A-Za-zÀ-ÿ\s'-]+"/>
            <div th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-7">
            <label for="cognoms" class="form-label">Cognoms <span class="text-danger">*</span></label>
            <input id="cognoms" type="text" th:field="*{cognoms}" class="form-control" th:errorclass="is-invalid"
                   required maxlength="80" pattern="[A-Za-zÀ-ÿ\s'-]+"/>
            <div th:if="${#fields.hasErrors('cognoms')}" th:errors="*{cognoms}" class="text-danger small mt-1"></div>
        </div>

        <div class="col-md-6">
            <label for="email" class="form-label">Correu electrònic <span class="text-danger">*</span></label>
            <input id="email" type="email" th:field="*{email}" class="form-control" th:errorclass="is-invalid"
                   required maxlength="100"/>
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-6">
            <label for="password" class="form-label">Contrasenya <span class="text-danger">*</span></label>
            <input id="password" type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid"
                   required minlength="6" maxlength="50"/>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small mt-1"></div>
            <div class="form-text">Mínim 6 caràcters.</div>
        </div>

        <div class="col-md-4">
            <label for="telefon" class="form-label">Telèfon <span class="text-danger">*</span></label>
            <input id="telefon" type="tel" th:field="*{telefon}" class="form-control" th:errorclass="is-invalid"
                   required maxlength="9" pattern="[0-9]{9}"/>
            <div th:if="${#fields.hasErrors('telefon')}" th:errors="*{telefon}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-4">
            <label for="tipusAssistent" class="form-label">Tipus d'assistent <span class="text-danger">*</span></label>
            <select id="tipusAssistent" th:field="*{tipusAssistent}" class="form-select" th:errorclass="is-invalid" required>
                <option value="">-- Seleccioneu --</option>
                <option value="PAP">Professional d'Assistència Personal (PAP)</option>
                <option value="PATI">Professional d'Assistència Terapèutica Infantil (PATI)</option>
            </select>
            <div th:if="${#fields.hasErrors('tipusAssistent')}" th:errors="*{tipusAssistent}" class="text-danger small mt-1"></div>
        </div>
        <div class="col-md-4">
            <label for="formacio" class="form-label">Formació</label>
            <input id="formacio" type="text" th:field="*{formacio}" class="form-control" maxlength="200"/>
        </div>

        <div class="col-md-6">
            <label for="experiencia" class="form-label">Experiència</label>
            <input id="experiencia" type="text" th:field="*{experiencia}" class="form-control" maxlength="200"/>
        </div>
        <div class="col-md-6">
            <label for="disponibilitat" class="form-label">Disponibilitat</label>
            <input id="disponibilitat" type="text" th:field="*{disponibilitat}" class="form-control" maxlength="200"/>
        </div>

        <div class="col-12 mt-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="consentiment" required/>
                <label class="form-check-label" for="consentiment">
                    He llegit i accepte la política de privacitat i cedisc les meues dades curriculars a l'OVI. *
                </label>
            </div>
        </div>

        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary"><i class="bi bi-person-check-fill me-1"></i>Enviar candidatura</button>
            <a th:href="@{/login}" class="btn btn-outline-secondary ms-2">Cancel·lar</a>
        </div>
    </form>
</section>
</body>
</html>
