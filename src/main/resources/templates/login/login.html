<!DOCTYPE html>
<html lang="ca"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Iniciar sessió</title>
</head>
<body>
<section layout:fragment="content">
    <h1>Iniciar sessió</h1>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/login}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label">Email:</label>
                            <input id="username" type="email" class="form-control"
                                   th:field="*{username}"
                                   th:errorclass="needcorrection"
                                   placeholder="nom@exemple.com" required/>
                            <div th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}" class="error"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contrasenya:</label>
                            <input id="password" type="password" class="form-control"
                                   th:field="*{password}"
                                   th:errorclass="needcorrection"
                                   required/>
                            <div th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}" class="error"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success mb-2">Accedir</button>
                            <p class="text-center text-muted small mb-1">Encara no tens compte?</p>
                            <a th:href="@{/register}" class="btn btn-outline-secondary btn-sm">Sóc Ciutadà (Sol·licitar Assistència)</a>
                            <a th:href="@{/register-assistent}" class="btn btn-outline-info btn-sm">Sóc Assistent (Treballar a l'OVI)</a>
                        </div>
                        <div class="forgot-password-text">
                            <i class="bi bi-info-circle me-1"></i>Has oblidat la contrasenya?
                            Contacta amb l'oficina OVI al telèfon 964 12 34 56 o al correu suport@ovi.es
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
